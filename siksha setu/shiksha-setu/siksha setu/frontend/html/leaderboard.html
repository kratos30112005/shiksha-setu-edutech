<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | ShikshaSetu</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; background: var(--bg-deep); min-height: 100vh; }
    .page-container { margin-left: 260px; flex: 1; padding: 40px; }

    .page-header { margin-bottom: 36px; }
    .page-header h1 { font-size: 36px; font-weight: 900; letter-spacing:-1.5px; background: linear-gradient(135deg, #F59E0B, #FBBF24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
    .page-header p { color: var(--text-secondary); font-size: 15px; }

    /* Tabs */
    .tab-bar {
      display: inline-flex;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 5px;
      border-radius: var(--radius-full);
      margin-bottom: 36px;
    }

    .tab-btn {
      padding: 10px 32px;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: var(--transition);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-sans);
    }

    .tab-btn.active {
      background: var(--gradient-brand);
      color: white;
      box-shadow: var(--shadow-brand);
    }

    /* Podium */
    .podium-section {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 16px;
      height: 260px;
      margin-bottom: 40px;
    }

    .podium-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 20px 20px 12px 12px;
      text-align: center;
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 150px;
      transition: var(--transition);
      cursor: default;
    }

    .podium-card:hover { transform: translateY(-5px); }

    .podium-1 {
      height: 200px;
      width: 170px;
      border-color: rgba(245,158,11,0.4);
      background: linear-gradient(to bottom, rgba(245,158,11,0.1), var(--bg-card));
    }

    .podium-2 { height: 165px; border-color: rgba(139,92,246,0.3); }
    .podium-3 { height: 135px; border-color: rgba(16,185,129,0.3); }

    .podium-crown { font-size: 32px; }
    .podium-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: white;
    }
    .podium-name { font-size: 13px; font-weight: 800; color: var(--text-primary); }
    .podium-score {
      font-size: 20px;
      font-weight: 900;
      background: var(--gradient-warm);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Table */
    .leaderboard-table {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { background: rgba(255,255,255,0.03); }

    th {
      padding: 16px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    td { padding: 14px 20px; border-bottom: 1px solid var(--border-subtle); font-size: 14px; }

    tr:last-child td { border-bottom: none; }

    tr { transition: var(--transition); }
    tr:hover { background: rgba(255,255,255,0.03); }

    .rank-col { font-size: 16px; font-weight: 900; color: var(--text-muted); width: 60px; }
    .rank-1 { color: #FBBF24; font-size: 18px; }
    .rank-2 { color: #A78BFA; font-size: 18px; }
    .rank-3 { color: #34D399; font-size: 18px; }

    .user-cell { display: flex; align-items: center; gap: 12px; }

    .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }

    .user-name { font-weight: 700; color: var(--text-primary); }

    .score-val { font-size: 16px; font-weight: 900; color: var(--text-primary); }
    .score-unit { font-size: 11px; color: var(--text-muted); font-weight: 600; }

    .focus-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(139,92,246,0.1);
      color: #A78BFA;
      border: 1px solid rgba(139,92,246,0.25);
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 700;
    }

    .streak { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; color: #F59E0B; }
  </style>
</head>
<body>
<div class="bg-mesh"></div>

<aside class="sidebar">
  <a href="/" class="sidebar-brand">ShikshaSetu</a>
  <nav class="sidebar-nav">
    <a href="/html/dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
    <a href="/html/ai-tutor.html" class="nav-link"><span class="nav-icon">🤖</span> AI Tutor</a>
    <a href="/html/mocktest.html" class="nav-link"><span class="nav-icon">📝</span> Mock Tests</a>
    <a href="/html/funquiz.html" class="nav-link"><span class="nav-icon">🎮</span> Fun Quiz</a>
    <a href="/html/exam-preparation.html" class="nav-link"><span class="nav-icon">🎯</span> Exam Prep</a>
    <a href="/html/smart-revision.html" class="nav-link"><span class="nav-icon">🧠</span> Smart Revision</a>
    <a href="/html/study-planner.html" class="nav-link"><span class="nav-icon">📅</span> Study Planner</a>
    <a href="/html/leaderboard.html" class="nav-link active"><span class="nav-icon">🏆</span> Leaderboard</a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-link" onclick="window.location.href='/'" style="color:#F87171;"><span class="nav-icon">🚪</span> Logout</button>
  </div>
</aside>

<div class="page-container">

  <div class="page-header anim-fade-up">
    <h1>🏆 Leaderboard</h1>
    <p>Global rankings powered by Saarthi AI performance metrics</p>
  </div>

  <div class="anim-fade-up-1">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchMode('individual', this)">Solo Learners</button>
      <button class="tab-btn" onclick="switchMode('group', this)">Study Squads</button>
    </div>
  </div>

  <div class="podium-section anim-fade-up-2" id="podium"></div>

  <div class="leaderboard-table anim-fade-up-3">
    <table>
      <thead>
        <tr>
          <th style="width:60px;">#</th>
          <th>Learner</th>
          <th>Score</th>
          <th>AI Focus Area</th>
          <th>Streak</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </div>

</div>

<div class="toast-container"></div>
<script src="/js/script.js"></script>
<script>

let currentMode = 'individual';

async function loadLeaderboard(mode) {
  currentMode = mode;

  try {
    const res = await fetch(`/api/leaderboard?mode=${mode}`);
    const data = await res.json();
    renderLeaderboard(data.leaderboard || []);
  } catch (err) {
    showToast('Could not load leaderboard.', 'error');
  }
}

function renderLeaderboard(list) {
  const podium = document.getElementById('podium');
  const body = document.getElementById('leaderboard-body');

  const rankIcons = ['👑', '🥈', '🥉'];
  const podiumClasses = ['podium-1', 'podium-2', 'podium-3'];

  // Render Podium: order is 2nd, 1st, 3rd
  const podiumOrder = [1, 0, 2];
  podium.innerHTML = podiumOrder.map(i => {
    if (!list[i]) return '';
    const item = list[i];
    const initials = item.name.split(' ').map(n => n[0]).join('');
    const cls = podiumClasses[i];
    return `
      <div class="podium-card ${cls}" style="animation: fadeInUp 0.5s ${i * 0.15}s both;">
        <div class="podium-crown">${rankIcons[i]}</div>
        <div class="podium-avatar" style="background:${item.color}">${initials}</div>
        <div class="podium-name">${item.name.split(' ')[0]}</div>
        <div class="podium-score">${item.score}</div>
      </div>
    `;
  }).join('');

  // Render Table
  body.innerHTML = '';
  list.forEach((item, i) => {
    const initials = item.name.split(' ').map(n => n[0]).join('');
    const rankClass = i < 3 ? `rank-${i+1}` : '';
    const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;

    body.innerHTML += `
      <tr style="animation: fadeInUp 0.4s ${i * 0.06}s both;">
        <td class="rank-col ${rankClass}">${rankLabel}</td>
        <td>
          <div class="user-cell">
            <div class="user-avatar" style="background:${item.color}">${initials}</div>
            <span class="user-name">${item.name}</span>
          </div>
        </td>
        <td>
          <span class="score-val">${item.score}</span>
          <span class="score-unit"> pts</span>
        </td>
        <td><span class="focus-pill">${item.improvement}</span></td>
        <td><span class="streak">🔥 ${item.streak || 1}d</span></td>
      </tr>
    `;
  });
}

function switchMode(mode, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadLeaderboard(mode);
}

loadLeaderboard('individual');
</script>
</body>
</html>
