<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Selection | ShikshaSetu</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-deep); }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-xl);
      padding: 40px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: var(--shadow-brand);
    }
    h2 { color: var(--text-primary); margin-bottom: 8px; }
    p { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; color: var(--text-secondary); font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-medium);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      cursor: pointer;
    }
    select option { background: var(--bg-deep); color: var(--text-primary); }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--gradient-brand);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: var(--shadow-brand); }
    .btn-mistakes {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--brand-secondary);
      border: 1px solid var(--brand-secondary);
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }
    .btn-mistakes:hover { background: rgba(236,72,153,0.1); }
  </style>
</head>
<body>
  <div class="card fade-in">
    <h2>Topic-Based Test System</h2>
    <p>Select a subject and topic to begin your assessment.</p>
    
    <div class="form-group">
      <label>Select Subject</label>
      <select id="subject-select" onchange="updateTopics()">
        <option value="">-- Choose Subject --</option>
        <option value="Mathematics">Mathematics</option>
        <option value="Science">Science</option>
      </select>
    </div>

    <div class="form-group">
      <label>Select Topic</label>
      <select id="topic-select">
        <option value="">-- Choose Topic --</option>
      </select>
    </div>

    <button class="btn-submit" onclick="startTest()">Start Test</button>

    <div style="margin: 20px 0; border-top: 1px solid var(--border-medium); padding-top: 20px;">
      <p style="margin-bottom: 12px; font-weight: 600; color: var(--text-primary);">OR</p>
      <div class="form-group">
        <label>Upload PDF for Custom Test</label>
        <input type="file" id="pdf-upload" accept="application/pdf" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px dashed var(--border-medium); border-radius: 10px; color: var(--text-primary); cursor: pointer;" />
      </div>
      <button class="btn-submit" onclick="uploadAndStart()" id="upload-btn" style="background: var(--brand-success);">Generate Test from PDF</button>
    </div>
    <button class="btn-mistakes" onclick="viewMistakes()">View Mistake Dashboard</button>
  </div>

  <script>
    const topicsMap = {
      "Mathematics": ["Algebra", "Geometry"],
      "Science": ["Physics"]
    };

    function updateTopics() {
      const subject = document.getElementById('subject-select').value;
      const topicSelect = document.getElementById('topic-select');
      topicSelect.innerHTML = '<option value="">-- Choose Topic --</option>';
      
      if (subject && topicsMap[subject]) {
        topicsMap[subject].forEach(topic => {
          const opt = document.createElement('option');
          opt.value = topic;
          opt.textContent = topic;
          topicSelect.appendChild(opt);
        });
      }
    }

    function startTest() {
      const subject = document.getElementById('subject-select').value;
      const topic = document.getElementById('topic-select').value;

      if (!subject || !topic) {
        alert("Please select both a subject and a topic.");
        return;
      }

      localStorage.setItem('currentTestSubject', subject);
      localStorage.setItem('currentTestTopic', topic);
      window.location.href = '/html/test-page.html';
    }

    async function uploadAndStart() {
      const fileInput = document.getElementById('pdf-upload');
      if (!fileInput.files.length) {
        alert("Please select a PDF file first.");
        return;
      }
      
      const file = fileInput.files[0];
      const formData = new FormData();
      formData.append("file", file);

      const btn = document.getElementById('upload-btn');
      const originalText = btn.textContent;
      btn.textContent = "Processing PDF... Please wait";
      btn.disabled = true;

      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        
        if (data.error) {
          alert("Error: " + data.error);
          btn.textContent = originalText;
          btn.disabled = false;
          return;
        }

        // Successfully uploaded and extracted
        localStorage.setItem('currentTestSubject', 'Custom PDF');
        localStorage.setItem('currentTestTopic', 'Uploaded Notes');
        window.location.href = '/html/test-page.html';
      } catch (err) {
        alert("Failed to upload PDF. Ensure the server is running.");
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    function viewMistakes() {
      window.location.href = '/html/mistake-dashboard.html';
    }
  </script>
</body>
</html>
